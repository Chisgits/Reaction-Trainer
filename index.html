<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reaction Trainer</title>
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  #app {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  .screen {
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .screen.active {
    display: flex;
  }

  /* ---------- Home screen ---------- */
  #home-screen {
    background: #111;
    gap: 2rem;
  }
  #home-title {
    color: #fff;
    font-size: 30px;
    font-weight: 600;
    margin: 0;
    text-align: center;
  }
  #home-options {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 80%;
    max-width: 320px;
  }
  .home-btn {
    padding: 26px 20px;
    border-radius: 16px;
    background: #fff;
    border: none;
    font-size: 20px;
    font-weight: 600;
    color: #111;
    cursor: pointer;
  }
  .home-btn:active {
    transform: scale(0.97);
  }
  .home-btn-sub {
    display: block;
    font-size: 13px;
    font-weight: 400;
    color: #666;
    margin-top: 4px;
  }

  /* ---------- Idle (pre-start) screens shared style ---------- */
  .idle-screen {
    background: #111;
    gap: 2rem;
  }
  .idle-title {
    color: #fff;
    font-size: 28px;
    font-weight: 600;
    margin: 0;
    text-align: center;
  }
  .idle-subtitle {
    color: #999;
    font-size: 15px;
    margin: -1.5rem 0 0;
    text-align: center;
    padding: 0 2rem;
  }
  .start-btn {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: #fff;
    border: none;
    font-size: 22px;
    font-weight: 600;
    color: #111;
    cursor: pointer;
  }
  .start-btn:active {
    transform: scale(0.97);
  }
  .settings-row {
    display: flex;
    gap: 10px;
    align-items: center;
    color: #999;
    font-size: 15px;
  }
  .voice-toggle {
    font-size: 15px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #222;
    color: #fff;
  }
  .back-link {
    position: absolute;
    top: 20px;
    left: 20px;
    background: none;
    border: none;
    color: #999;
    font-size: 15px;
    cursor: pointer;
    padding: 8px;
  }

  /* ---------- Run screens ---------- */
  .run-screen {
    background: #000;
  }
  .stop-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    z-index: 5;
  }
  .timer-pill {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 10px;
    z-index: 5;
  }
  .main-label {
    font-size: 72px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .interval-label {
    font-size: 16px;
    color: rgba(255,255,255,0.85);
    margin-top: 10px;
  }
  #turner-arrow {
    width: 110px;
    height: 110px;
    margin-bottom: 1.5rem;
    transition: transform 0.15s ease;
  }

  /* ---------- End screens ---------- */
  .end-screen {
    background: #000;
    gap: 1.5rem;
  }
  .end-title {
    color: #fff;
    font-size: 24px;
    font-weight: 600;
    margin: 0;
  }
  .end-actions {
    display: flex;
    gap: 14px;
  }
  .end-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="app">

  <!-- ================= HOME ================= -->
  <div id="home-screen" class="screen active">
    <h1 id="home-title">Reaction Trainer</h1>
    <div id="home-options">
      <button class="home-btn" id="go-color-caller">
        Color caller
        <span class="home-btn-sub">Flashes and calls a random color</span>
      </button>
      <button class="home-btn" id="go-turner">
        Turner
        <span class="home-btn-sub">Calls a random direction</span>
      </button>
    </div>
  </div>

  <!-- ================= COLOR CALLER ================= -->
  <div id="cc-idle-screen" class="screen idle-screen">
    <button class="back-link" data-home>&#8592; Home</button>
    <h1 class="idle-title">Color caller</h1>
    <p class="idle-subtitle">4 minute session. Starts at 3s per color, speeding up every 10 calls down to a 1s minimum.</p>
    <button class="start-btn" id="cc-start-btn">Start</button>
    <div class="settings-row">
      <label for="cc-voice-toggle">Voice</label>
      <select class="voice-toggle" id="cc-voice-toggle">
        <option value="on">On</option>
        <option value="off">Off</option>
      </select>
    </div>
  </div>

  <div id="cc-run-screen" class="screen run-screen">
    <button class="stop-btn" id="cc-stop-btn" aria-label="Stop">&#10005;</button>
    <div class="timer-pill" id="cc-timer-pill">4:00</div>
    <div class="main-label" id="cc-color-label"></div>
    <div class="interval-label" id="cc-interval-label"></div>
  </div>

  <div id="cc-end-screen" class="screen end-screen">
    <p class="end-title">Session complete</p>
    <div class="end-actions">
      <button class="end-btn" id="cc-restart-btn">Run again</button>
      <button class="end-btn" data-home>Home</button>
    </div>
  </div>

  <!-- ================= TURNER ================= -->
  <div id="tn-idle-screen" class="screen idle-screen">
    <button class="back-link" data-home>&#8592; Home</button>
    <h1 class="idle-title">Turner</h1>
    <p class="idle-subtitle">4 minute session. Calls a random direction every few seconds, speeding up after every 3 calls.</p>
    <button class="start-btn" id="tn-start-btn">Start</button>
    <div class="settings-row">
      <label for="tn-voice-toggle">Voice</label>
      <select class="voice-toggle" id="tn-voice-toggle">
        <option value="on">On</option>
        <option value="off">Off</option>
      </select>
    </div>
  </div>

  <div id="tn-run-screen" class="screen run-screen">
    <button class="stop-btn" id="tn-stop-btn" aria-label="Stop">&#10005;</button>
    <div class="timer-pill" id="tn-timer-pill">4:00</div>
    <svg id="turner-arrow" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path id="turner-arrow-path" d="M50 15 L50 85 M50 15 L30 35 M50 15 L70 35" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="main-label" id="tn-direction-label"></div>
    <div class="interval-label" id="tn-interval-label"></div>
  </div>

  <div id="tn-end-screen" class="screen end-screen">
    <p class="end-title">Session complete</p>
    <div class="end-actions">
      <button class="end-btn" id="tn-restart-btn">Run again</button>
      <button class="end-btn" data-home>Home</button>
    </div>
  </div>

</div>

<script>
(function () {
  // ===================== Shared helpers =====================
  var screens = {
    home: document.getElementById('home-screen'),
    ccIdle: document.getElementById('cc-idle-screen'),
    ccRun: document.getElementById('cc-run-screen'),
    ccEnd: document.getElementById('cc-end-screen'),
    tnIdle: document.getElementById('tn-idle-screen'),
    tnRun: document.getElementById('tn-run-screen'),
    tnEnd: document.getElementById('tn-end-screen')
  };

  function showScreen(key) {
    Object.keys(screens).forEach(function (k) {
      screens[k].classList.toggle('active', k === key);
    });
  }

  function formatTime(ms) {
    var s = Math.max(0, Math.ceil(ms / 1000));
    var m = Math.floor(s / 60);
    var rem = s % 60;
    return m + ':' + (rem < 10 ? '0' : '') + rem;
  }

  function speak(text, voiceToggleEl) {
    if (voiceToggleEl.value !== 'on') return;
    if (!('speechSynthesis' in window)) return;
    try {
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.rate = 1.05;
      u.pitch = 1;
      u.volume = 1;
      window.speechSynthesis.speak(u);
    } catch (e) {
      // speech synthesis not available; fail silently
    }
  }

  var TOTAL_MS = 4 * 60 * 1000; // total run time: 4 minutes, shared by both modes
  var START_INTERVAL = 6;       // seconds, first cycle, shared by both modes
  var STEP = 0.25;              // seconds shaved off per completed cycle, shared
  var FLOOR = 1;                // never go below 1 second per call, shared

  function stopAllSpeech() {
    if ('speechSynthesis' in window) {
      try { window.speechSynthesis.cancel(); } catch (e) {}
    }
  }

  document.querySelectorAll('[data-home]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      ColorCaller.reset();
      Turner.reset();
      showScreen('home');
    });
  });

  document.getElementById('go-color-caller').addEventListener('click', function () {
    showScreen('ccIdle');
  });
  document.getElementById('go-turner').addEventListener('click', function () {
    showScreen('tnIdle');
  });

  // ===================== Wake lock manager =====================
  // Keeps the screen on while a session is running.
  // Uses the Screen Wake Lock API (supported in Chrome on Android).
  var wakeLock = null;
  var running = false; // shared running flag used by visibilitychange re-acquire

  function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    navigator.wakeLock.request('screen').then(function (lock) {
      wakeLock = lock;
      lock.addEventListener('release', function () { wakeLock = null; });
    }).catch(function () {
      // Wake lock not granted — session continues normally, screen may sleep
    });
  }

  function releaseWakeLock() {
    if (wakeLock) {
      wakeLock.release().catch(function () {});
      wakeLock = null;
    }
  }

  // Re-acquire if the user switches away and back mid-session
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible' && running) {
      acquireWakeLock();
    }
  });

  // ===================== Color caller module =====================
  var ColorCaller = (function () {
    var START_INTERVAL = 3; // Color Caller starts at 3s (overrides shared value)
    var COLORS = {
      orange: '#D85A30',
      yellow: '#EF9F27',
      red:    '#A32D2D',
      green:  '#3B6D11'
    };
    var COLORS_PER_CYCLE = 10;

    var runScreen = document.getElementById('cc-run-screen');
    var startBtn = document.getElementById('cc-start-btn');
    var stopBtn = document.getElementById('cc-stop-btn');
    var restartBtn = document.getElementById('cc-restart-btn');
    var voiceToggle = document.getElementById('cc-voice-toggle');
    var colorLabel = document.getElementById('cc-color-label');
    var intervalLabel = document.getElementById('cc-interval-label');
    var timerPill = document.getElementById('cc-timer-pill');

    var sessionStart = 0;
    var count = 0;
    var stepTimer = null;
    var tickTimer = null;
    var running = false;
    var lastColor = null;

    function currentInterval() {
      var cycle = Math.floor(count / COLORS_PER_CYCLE);
      var val = START_INTERVAL - cycle * STEP;
      return Math.max(val, FLOOR);
    }

    function pickColor() {
      var keys = Object.keys(COLORS);
      var choice;
      do {
        choice = keys[Math.floor(Math.random() * keys.length)];
      } while (choice === lastColor && keys.length > 1);
      lastColor = choice;
      return choice;
    }

    function step() {
      if (!running) return;
      var elapsed = Date.now() - sessionStart;
      if (elapsed >= TOTAL_MS) {
        finish();
        return;
      }
      var name = pickColor();
      runScreen.style.background = COLORS[name];
      colorLabel.textContent = name;

      var interval = currentInterval();
      intervalLabel.textContent = interval.toFixed(2) + 's';

      speak(name, voiceToggle);
      count++;

      var remaining = TOTAL_MS - elapsed;
      var nextDelay = Math.min(interval * 1000, remaining);
      stepTimer = setTimeout(step, nextDelay);
    }

    function tick() {
      if (!running) return;
      var elapsed = Date.now() - sessionStart;
      var remaining = TOTAL_MS - elapsed;
      timerPill.textContent = remaining <= 0 ? '0:00' : formatTime(remaining);
    }

    function start() {
      running = true;
      count = 0;
      lastColor = null;
      sessionStart = Date.now();
      acquireWakeLock();
      showScreen('ccRun');
      timerPill.textContent = formatTime(TOTAL_MS);
      step();
      tickTimer = setInterval(tick, 250);
    }

    function finish() {
      running = false;
      if (stepTimer) clearTimeout(stepTimer);
      if (tickTimer) clearInterval(tickTimer);
      stopAllSpeech();
      releaseWakeLock();
      runScreen.style.background = '#000';
      showScreen('ccEnd');
    }

    function reset() {
      running = false;
      if (stepTimer) clearTimeout(stepTimer);
      if (tickTimer) clearInterval(tickTimer);
      stopAllSpeech();
      releaseWakeLock();
      runScreen.style.background = '#000';
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', function () {
      reset();
      showScreen('ccIdle');
    });
    restartBtn.addEventListener('click', function () {
      reset();
      showScreen('ccIdle');
    });

    return { reset: reset };
  })();

  // ===================== Turner module =====================
  var Turner = (function () {
    var DIRECTIONS = ['left', 'right', 'back'];
    var TURNS_PER_CYCLE = 3;

    var stopBtn = document.getElementById('tn-stop-btn');
    var startBtn = document.getElementById('tn-start-btn');
    var restartBtn = document.getElementById('tn-restart-btn');
    var voiceToggle = document.getElementById('tn-voice-toggle');
    var directionLabel = document.getElementById('tn-direction-label');
    var intervalLabel = document.getElementById('tn-interval-label');
    var timerPill = document.getElementById('tn-timer-pill');
    var arrow = document.getElementById('turner-arrow');

    var ARROW_ROTATION = {
      left: -90,
      right: 90,
      back: 180
    };

    var sessionStart = 0;
    var count = 0;
    var stepTimer = null;
    var tickTimer = null;
    var running = false;
    var lastDirection = null;
    var streakCount = 0;
    var MAX_STREAK = 3; // same direction can't be called more than 3 times in a row

    function currentInterval() {
      var cycle = Math.floor(count / TURNS_PER_CYCLE);
      var val = START_INTERVAL - cycle * STEP;
      return Math.max(val, FLOOR);
    }

    function pickDirection() {
      var pool = DIRECTIONS;
      if (streakCount >= MAX_STREAK && lastDirection) {
        pool = DIRECTIONS.filter(function (d) { return d !== lastDirection; });
      }
      var choice = pool[Math.floor(Math.random() * pool.length)];

      if (choice === lastDirection) {
        streakCount++;
      } else {
        lastDirection = choice;
        streakCount = 1;
      }
      return choice;
    }

    function step() {
      if (!running) return;
      var elapsed = Date.now() - sessionStart;
      if (elapsed >= TOTAL_MS) {
        finish();
        return;
      }
      var dir = pickDirection();
      directionLabel.textContent = dir;
      arrow.style.transform = 'rotate(' + ARROW_ROTATION[dir] + 'deg)';

      var interval = currentInterval();
      intervalLabel.textContent = interval.toFixed(2) + 's';

      speak(dir, voiceToggle);
      count++;

      var remaining = TOTAL_MS - elapsed;
      var nextDelay = Math.min(interval * 1000, remaining);
      stepTimer = setTimeout(step, nextDelay);
    }

    function tick() {
      if (!running) return;
      var elapsed = Date.now() - sessionStart;
      var remaining = TOTAL_MS - elapsed;
      timerPill.textContent = remaining <= 0 ? '0:00' : formatTime(remaining);
    }

    function start() {
      running = true;
      count = 0;
      lastDirection = null;
      streakCount = 0;
      sessionStart = Date.now();
      acquireWakeLock();
      arrow.style.transform = 'rotate(0deg)';
      showScreen('tnRun');
      timerPill.textContent = formatTime(TOTAL_MS);
      step();
      tickTimer = setInterval(tick, 250);
    }

    function finish() {
      running = false;
      if (stepTimer) clearTimeout(stepTimer);
      if (tickTimer) clearInterval(tickTimer);
      stopAllSpeech();
      releaseWakeLock();
      showScreen('tnEnd');
    }

    function reset() {
      running = false;
      if (stepTimer) clearTimeout(stepTimer);
      if (tickTimer) clearInterval(tickTimer);
      stopAllSpeech();
      releaseWakeLock();
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', function () {
      reset();
      showScreen('tnIdle');
    });
    restartBtn.addEventListener('click', function () {
      reset();
      showScreen('tnIdle');
    });

    return { reset: reset };
  })();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>

</body>
</html>
